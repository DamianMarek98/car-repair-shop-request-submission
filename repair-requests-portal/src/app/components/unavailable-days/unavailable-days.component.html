<div class="example-container">
    <mat-card class="demo-inline-calendar-card">
        <mat-card-header>
            <mat-card-title>Dostępność warsztatu</mat-card-title>
        </mat-card-header>
        <mat-card-content class="calendar-card-content">
            <mat-calendar [(selected)]="selected" [dateFilter]="dateFilter" [minDate]="todaysDate"></mat-calendar>
            <div class="calendar-actions">
                <button mat-raised-button (click)="setAsUnavailableSelectedDate()">Oznacz dzień jako niedostępny</button>
                <button mat-raised-button class="motrio-btn-secondary" (click)="clearUnavailableDys()">Reset</button>
            </div>
        </mat-card-content>
    </mat-card>
</div>
